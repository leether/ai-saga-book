name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk pandoc
          cargo install mdbook typst-cli

      - name: Merge chapters for PDF/EPUB/DOCX
        run: |
          python3 scripts/merge_chapters.py

      - name: Build mdBook (HTML)
        run: |
          cd book
          mdbook build
          mv book-output ../html-output

      - name: Build PDF (Typst)
        run: |
          python3 scripts/build_pdf_typst.py

      - name: Build EPUB
        run: |
          pandoc 全书.md \
            -o "智能涌动.epub" \
            --metadata title="智能涌动" \
            --metadata author="新褶" \
            --metadata lang="zh" \
            --epub-chapter-level=2 \
            --toc

      - name: Build DOCX
        run: |
          pandoc 全书.md \
            -o "智能涌动.docx" \
            --metadata title="智能涌动" \
            --metadata author="新褶" \
            --toc

      - name: Upload artifact (HTML)
        uses: actions/upload-pages-artifact@v3
        with:
          path: html-output

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            智能涌动.pdf
            智能涌动.epub
            智能涌动.docx
          body: |
            ## 智能涌动

            下载精排 PDF、EPUB 或 DOCX。

            [在线阅读](https://leether.github.io/ai-saga-book)

            [源码仓库](https://github.com/leether/ai-saga-book)

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
